<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Come to FRC</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #ffffff;
      color: #000000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #ffffff;
    }

    main {
      width: min(92vw, 980px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 7.5rem);
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: 0;
      color: #000000;
    }

    .passion {
      display: inline-block;
      color: transparent;
      background:
        linear-gradient(
          90deg,
          #3489d8 0%,
          #477fc9 18%,
          #5f70bd 32%,
          #8f64b2 47%,
          #c957a4 62%,
          #e84673 76%,
          #f03b51 88%,
          #f15a24 100%
        );
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: none;
      text-shadow: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>
      Come to FRC.<br>
      Find your next <span class="passion">Passion.</span>
    </h1>
  </main>
</body>
</html>
